services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tb_frontend
    ports:
      - "5175:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - my_network

networks:
  my_network:
    driver: bridge
