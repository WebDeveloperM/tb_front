events {
	worker_connections 1024;
}

stream {
	map $ssl_preread_protocol $frontend_upstream {
		""      frontend_http_redirect;
		default frontend_https_app;
	}

	upstream frontend_http_redirect {
		server 127.0.0.1:8080;
	}

	upstream frontend_https_app {
		server 127.0.0.1:8443;
	}

	server {
		listen 443;
		proxy_pass $frontend_upstream;
		ssl_preread on;
	}
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	sendfile on;
	keepalive_timeout 65;

	map $http_host $redirect_host {
		default $http_host;
		"" $host:5175;
	}

	server {
		listen 8080;
		server_name _;
		return 301 https://$redirect_host$request_uri;
	}

	server {
		listen 8443 ssl;
		server_name _;

		ssl_certificate /etc/nginx/certs/frontend.crt;
		ssl_certificate_key /etc/nginx/certs/frontend.key;
		ssl_protocols TLSv1.2 TLSv1.3;

		root /usr/share/nginx/html;
		index index.html;

		location /api/ {
			proxy_pass https://host.docker.internal:8005;
			proxy_set_header Host $http_host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto https;
			proxy_ssl_server_name on;
			proxy_ssl_verify off;
		}

		location /media/ {
			proxy_pass https://host.docker.internal:8005;
			proxy_set_header Host $http_host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto https;
			proxy_ssl_server_name on;
			proxy_ssl_verify off;
		}

		location / {
			try_files $uri $uri/ /index.html;
		}
	}
}
